<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        h2 { font-size: 24px; }
    </style>
</head>
<body>
    <h2>Welcome, <span id="username"></span>!</h2>

    <script>
        // Check if the token is present in localStorage
        const token = localStorage.getItem('authToken');

        if (!token) {
            // Redirect to login if no token is found (user not logged in)
            window.location.href = 'login.html';
        } else {
            // Decode the token (Base64 decode)
            const username = atob(token);  // Decode the Base64-encoded username
            document.getElementById('username').textContent = username;  // Display the username
        }
    </script>
</body>
</html>
