<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        input[type="text"], input[type="password"] { margin: 10px; padding: 10px; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="Enter Username" required><br>
        <input type="password" id="loginPassword" placeholder="Enter Password" required><br>
        <button type="submit">Login</button>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const data = { username, password };

            fetch('https://loginapi-a2qy.onrender.com/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(responseData => {
                alert(responseData.message);
                if (responseData.message === 'Login successful!') {
                    // Create an encoded token with the username
                    const encodedUsername = btoa(username);  // Base64 encode the username
                    localStorage.setItem('authToken', encodedUsername);  // Store the token in localStorage
                    window.location.href = 'index.html';  // Redirect to the home page
                }
            })
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
